version: 2
updates:
  # Enable version updates for pip dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    # Limit the number of open pull requests for version updates
    open-pull-requests-limit: 10
    # Add labels to pull requests
    labels:
      - "dependencies"
      - "security"
    # Assign reviewers (update with your GitHub username)
    reviewers:
      - "timwonderer"
    # Group all patch updates into a single PR.
    # opentelemetry-* is listed first so all OTel packages (core + instrumentation)
    # are always co-grouped regardless of whether the version bump is classified as
    # patch or minor by Dependabot (instrumentation pre-release bumps like 0.62b0→0.62b1
    # may not be recognized as patch updates). This prevents the lockstep version
    # conflict that occurred in PR #1174.
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry-*"
        update-types:
          - "minor"
          - "patch"
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
    # Allow both direct and indirect updates
    allow:
      - dependency-type: "all"
    # Uncomment to ignore specific packages or version ranges
    # ignore:
    #   - dependency-name: "flask"
    #     update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "timwonderer"
