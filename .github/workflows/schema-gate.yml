name: Schema Change Gate

on:
  pull_request:
    paths:
      - 'migrations/versions/**'
      - 'app/models.py'
      - 'app/models/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  schema-gate-enforcement:
    name: Schema Change Gate
    runs-on: ubuntu-latest
    
    # Use a service container for true migration rehearsal (Requirement 3.5)
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: classroom_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # -----------------------------------------------------------
      # 1. PR Classification Check (Requirement 2)
      # -----------------------------------------------------------
      - name: Check PR Classification
        id: check_classification
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.issue.number;
            const { owner, repo } = context.repo;

            // Pull latest PR body from API so reruns and stale event payloads do not cause false negatives.
            let body = context.payload.pull_request?.body || "";
            try {
              const pr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber
              });
              body = pr.data.body || "";
            } catch (error) {
              core.warning(`Unable to fetch latest PR body; falling back to event payload. ${error.message}`);
            }

            const normalizedBody = body.replace(/\r\n/g, '\n');
            const classifications = [
              "EXPAND",
              "CONTRACT (CODE ONLY)",
              "CONTRACT (DATABASE)"
            ];

            const matches = [];
            const lines = normalizedBody.split('\n');

            // Match checked markdown checkboxes in common variants:
            // - [x] LABEL
            // * [X] **LABEL**
            classifications.forEach((type) => {
              const escapedType = type.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`^\\s*[-*]\\s*\\[[xX]\\]\\s*(?:\\*\\*)?\\s*${escapedType}\\s*(?:\\*\\*)?(?:\\s|$)`);
              if (lines.some(line => regex.test(line))) {
                matches.push(type);
              }
            });

            if (matches.length === 0) {
              core.setFailed("❌ Schema Change Gate Failed: No PR classification selected. Check one of: EXPAND, CONTRACT (CODE ONLY), CONTRACT (DATABASE)");
            } else if (matches.length > 1) {
              core.setFailed("❌ Schema Change Gate Failed: Multiple classifications selected. Please select exactly ONE.");
            } else {
              const found = matches[0];
              console.log(`✅ PR Classified as: ${found}`);
              core.setOutput('classification', found);
            }

      # -----------------------------------------------------------
      # 2. Deprecated Symbol Audit (Requirement 3.3)
      # -----------------------------------------------------------
      # -----------------------------------------------------------
      # 2. Deprecated Symbol Audit (Requirement 3.3)
      # -----------------------------------------------------------
      - name: Audit Deprecated Symbols
        run: |
          echo "🔍 Scanning for deprecated symbol usage in application code..."

          # Fix 3: Require deprecated_symbols.txt to exist
          if [ ! -f docs/development/DEPRECATED_SYMBOLS.txt ]; then
            echo "❌ Missing mandatory file: docs/development/DEPRECATED_SYMBOLS.txt"
            echo "   Please create this file (it can be empty if no symbols are deprecated)."
            exit 1
          fi

          # Fix 3 (continued): Scan app, templates, and scripts
          has_errors=0
          while IFS= read -r symbol; do
            # Skip empty lines or comments
            [[ -z "$symbol" || "$symbol" =~ ^# ]] && continue

            if grep -r "$symbol" app/ templates/ scripts/ --include="*.py" --include="*.html" --include="*.sh"; then
              echo "❌ Found usage of deprecated symbol '$symbol' in codebase."
              has_errors=1
            fi
          done < docs/development/DEPRECATED_SYMBOLS.txt

          if [ $has_errors -eq 1 ]; then
            exit 1
          else
            echo "✅ No deprecated usage found."
          fi

      # -----------------------------------------------------------
      # 3. Migration Rehearsal (Requirement 3.5)
      # -----------------------------------------------------------
      - name: Rehearse Migration (Upgrade & Downgrade)
        env:
          FLASK_APP: app
          FLASK_ENV: testing
          DATABASE_URL: postgresql://user:password@localhost:5432/classroom_test_db


          # Testing-only secrets — DO NOT reuse in production
          ENCRYPTION_KEY: UENU-3IwrMOdyGCaQR-2suY5Mv5NCsyQkja6CHJBG1I=
          PEPPER_KEY: 9183723b5d7ba66102f766a6a8600a76fe4b95b9be57fb7d8fd1791b67ecdf7c
          SECRET_KEY: 7536c8660c96747163e93cefd072489243ba976abd646cb3df9e26d2af3e2afe
        run: |
          echo "🔄 Starting Migration Rehearsal..."

          flask db upgrade
          echo "✅ Upgrade Successful"

          if grep -q "IRREVERSIBLE" migrations/versions/*.py; then
             echo "⚠️ Irreversible migration declared; skipping downgrade."
          else
             # Get current head and its down_revision to handle merge migrations
             CURRENT_HEAD=$(flask db current 2>/dev/null | head -1 | awk '{print $1}')
             if [ -n "$CURRENT_HEAD" ]; then
               # Find the migration file and extract its down_revision
               MIGRATION_FILE=$(grep -l "^Revision ID: $CURRENT_HEAD" migrations/versions/*.py 2>/dev/null | head -1)
               if [ -n "$MIGRATION_FILE" ]; then
                 DOWN_REV=$(grep "^down_revision" "$MIGRATION_FILE" | head -1 | sed "s/.*'\([^']*\)'.*/\1/")
                 if [ -n "$DOWN_REV" ]; then
                   echo "Downgrading from $CURRENT_HEAD to $DOWN_REV"
                   flask db downgrade "$DOWN_REV"
                   echo "✅ Downgrade Successful"
                 else
                   echo "⚠️ Could not determine down_revision, skipping downgrade test"
                 fi
               else
                 echo "⚠️ Could not find migration file for $CURRENT_HEAD, skipping downgrade test"
               fi
             else
               echo "⚠️ Could not determine current head, skipping downgrade test"
             fi
          fi

          flask db upgrade
          echo "✅ Re-Upgrade Successful"

      # -----------------------------------------------------------
      # 4. Smoke Test Critical Workflows (Requirements 3.6 & 3.7)
      # -----------------------------------------------------------
      - name: Run Critical Workflow Smoke Tests
        env:
          FLASK_APP: app
          FLASK_ENV: testing
          DATABASE_URL: postgresql://user:password@localhost:5432/classroom_test_db

          # Testing-only secrets — DO NOT reuse in production
          ENCRYPTION_KEY: UENU-3IwrMOdyGCaQR-2suY5Mv5NCsyQkja6CHJBG1I=
          PEPPER_KEY: 9183723b5d7ba66102f766a6a8600a76fe4b95b9be57fb7d8fd1791b67ecdf7c
          SECRET_KEY: 7536c8660c96747163e93cefd072489243ba976abd646cb3df9e26d2af3e2afe
        run: |
          echo "🔥 Running Smoke Tests on Critical Workflows..."
          pytest -v -m "critical or regression"
      # -----------------------------------------------------------
      # 5. Notify Requirements (Requirement 4.1)
      # -----------------------------------------------------------
      - name: Post Gate Status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const classification = '${{ steps.check_classification.outputs.classification }}';
            const classificationOutcome = '${{ steps.check_classification.outcome }}';
            const status = '${{ job.status }}';
            
            if (status === 'failure') {
              const { owner, repo } = context.repo;
              const runId = context.runId;

              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: runId,
                per_page: 100
              });

              const failedConclusions = new Set(['failure', 'timed_out', 'cancelled', 'startup_failure', 'action_required']);
              const allJobs = jobs.data.jobs || [];
              const candidateJobs = allJobs.filter((job) => failedConclusions.has(job.conclusion) || job.status === 'in_progress');
              const schemaJob =
                candidateJobs.find((job) => job.name?.toLowerCase().includes('schema change gate')) ||
                candidateJobs[0] ||
                allJobs[0];
              const failedSteps = (schemaJob?.steps || [])
                .filter((step) => failedConclusions.has(step.conclusion) || step.status === 'in_progress')
                .map((step) => `- ${step.name} (${step.conclusion || step.status})`);

              const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId}`;
              const jobUrl = schemaJob?.html_url || runUrl;
              const classificationLine = classification
                ? `- Classification: \`${classification}\``
                : `- Classification: not detected (step outcome: \`${classificationOutcome}\`)`;

              const failureSection = failedSteps.length
                ? failedSteps.join('\n')
                : '- Failure details unavailable from job metadata; open logs link below.';

              const marker = '<!-- schema-gate-failure-comment -->';
              const body = `${marker}\n⛔ **Schema Change Gate Failed**\n\nThis PR modifies the schema and the gate job failed.\n\n**Detected failure context**\n${classificationLine}\n- Job conclusion: \`${schemaJob?.conclusion || 'failure'}\`\n- Failed step(s):\n${failureSection}\n\n**Logs**\n- [Failed job logs](${jobUrl})\n- [Workflow run](${runUrl})\n\nPlease refer to your team's schema change guidelines for next steps.`;

              const comments = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: context.issue.number,
                per_page: 100
              });
              const existing = comments.data.find((comment) => {
                const isBot = comment.user?.type === 'Bot' || comment.user?.login?.includes('[bot]');
                return isBot && typeof comment.body === 'string' && comment.body.includes(marker);
              });

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner,
                  repo,
                  body
                });
              }
            } else {
               console.log("Gate Passed.");
            }
