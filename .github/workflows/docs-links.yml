name: Docs Link Checks

on:
  pull_request:
    paths:
      - "README.md"
      - "DEVELOPMENT.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "lychee.toml"
      - "pyproject.toml"
      - "scripts/check_production_docs.py"
      - ".github/workflows/docs-links.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "DEVELOPMENT.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "lychee.toml"
      - "pyproject.toml"
      - "scripts/check_production_docs.py"
      - ".github/workflows/docs-links.yml"
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-doc-links:
    name: Local Docs Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check local docs links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline .

  markdown-web-links:
    name: Markdown Web Links
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install md-dead-link-check
        run: |
          python -m pip install --upgrade pip
          pip install md-dead-link-check==1.3.0

      - name: Check Markdown web links with throttling
        run: md-dead-link-check --config pyproject.toml

  production-docs-smoke:
    name: Production Docs Smoke
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Smoke-test curated production docs URLs
        run: |
          python scripts/check_production_docs.py \
            --base-url https://app.classroomtokenhub.com \
            --manifest docs/production-docs-manifest.txt \
            --timeout 20 \
            --delay 2

