name: Toggle Maintenance Mode

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'Enable maintenance mode'
        required: true
        type: boolean
        default: false
      badge_type:
        description: 'Badge type'
        required: false
        type: choice
        default: 'maintenance'
        options:
          - maintenance
          - bug
          - security
          - update
          - feature
          - unavailable
          - error
      message:
        description: 'Maintenance message'
        required: false
        default: ""
      expected_end:
        description: 'Expected end time (e.g., "Back online by 3:00 PM")'
        required: false
        default: ''
      contact:
        description: 'Contact email'
        required: false
        default: ''
      status_description:
        description: 'The application is currently:'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  toggle:
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.DO_DEPLOY_KEY }}

    # SECURITY FIX: Add SSH host key verification to prevent MITM attacks
    - name: Set up SSH host key verification
      env:
        KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts
        echo "✓ SSH host key verification enabled"

    - name: Update maintenance mode on server
      env:
        PRODUCTION_SERVER_IP: ${{ secrets.PRODUCTION_SERVER_IP }}
        INPUT_ENABLED: ${{ inputs.enabled }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_EXPECTED_END: ${{ inputs.expected_end }}
        INPUT_CONTACT: ${{ inputs.contact }}
        INPUT_BADGE_TYPE: ${{ inputs.badge_type }}
        INPUT_STATUS_DESCRIPTION: ${{ inputs.status_description }}
      run: |
        MODE_VALUE="false"
        if [ "$INPUT_ENABLED" = "true" ]; then
          MODE_VALUE="true"
        fi

        SSH_ENV_VARS="MODE_VALUE=$(printf %q "${MODE_VALUE}") MESSAGE=$(printf %q "${INPUT_MESSAGE}") EXPECTED_END=$(printf %q "${INPUT_EXPECTED_END}") CONTACT=$(printf %q "${INPUT_CONTACT}") BADGE_TYPE=$(printf %q "${INPUT_BADGE_TYPE}") STATUS_DESCRIPTION=$(printf %q "${INPUT_STATUS_DESCRIPTION}")"

        ssh root@"$PRODUCTION_SERVER_IP" "export ${SSH_ENV_VARS}; bash -s" << 'EOF'
          set -e

          echo 'Navigating to project directory...'
          cd ~/classroom-economy

          echo 'Updating maintenance mode settings...'
          # SECURITY: Set restrictive file permissions before writing
          touch .env
          chmod 600 .env

          # Remove old maintenance mode variables
          sed -i '/^MAINTENANCE_MODE=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_MESSAGE=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_EXPECTED_END=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_CONTACT=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_BADGE_TYPE=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_STATUS_DESCRIPTION=/d' .env 2>/dev/null || true

          # Add new maintenance mode variables
          # Sanitize values: strip CR/LF and escape embedded quotes/backslashes
          # to prevent .env corruption or injection of extra entries.
          sanitize() {
            printf '%s' "$1" | tr -d '\r\n' | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          SAFE_MESSAGE="$(sanitize "$MESSAGE")"
          SAFE_EXPECTED_END="$(sanitize "$EXPECTED_END")"
          SAFE_CONTACT="$(sanitize "$CONTACT")"
          SAFE_BADGE_TYPE="$(sanitize "$BADGE_TYPE")"
          SAFE_STATUS_DESC="$(sanitize "$STATUS_DESCRIPTION")"

          echo "MAINTENANCE_MODE=$MODE_VALUE" >> .env
          echo "MAINTENANCE_MESSAGE=\"${SAFE_MESSAGE}\"" >> .env
          echo "MAINTENANCE_EXPECTED_END=\"${SAFE_EXPECTED_END}\"" >> .env
          echo "MAINTENANCE_CONTACT=\"${SAFE_CONTACT}\"" >> .env
          echo "MAINTENANCE_BADGE_TYPE=\"${SAFE_BADGE_TYPE}\"" >> .env
          echo "MAINTENANCE_STATUS_DESCRIPTION=\"${SAFE_STATUS_DESC}\"" >> .env

          echo 'Restarting Gunicorn to apply changes...'
          sudo systemctl restart gunicorn

          echo "Maintenance mode updated: $MODE_VALUE"
          if [ "$MODE_VALUE" = "true" ]; then
            echo "Badge type: $BADGE_TYPE"
            echo "Message: $MESSAGE"
            echo "Expected end: $EXPECTED_END"
            echo "Contact: $CONTACT"
            echo "Status description: $STATUS_DESCRIPTION"
          fi
        EOF

    - name: Summary
      env:
        INPUT_ENABLED: ${{ inputs.enabled }}
        INPUT_BADGE_TYPE: ${{ inputs.badge_type }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_STATUS_DESCRIPTION: ${{ inputs.status_description }}
      run: |
        if [ "$INPUT_ENABLED" = "true" ]; then
          echo "Maintenance mode ENABLED"
          echo "Badge type: $INPUT_BADGE_TYPE"
          echo "Message: $INPUT_MESSAGE"
          echo "Status: $INPUT_STATUS_DESCRIPTION"
        else
          echo "Maintenance mode DISABLED - Site is live"
        fi

