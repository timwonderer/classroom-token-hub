name: Policy Guardrails

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  guardrails-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run policy guardrails (waivers allowed on PR)
        run: python scripts/policy_guardrails.py --git-diff-base "origin/${{ github.base_ref }}" --git-diff-head "${{ github.sha }}"

  guardrails-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run policy guardrails (no waivers allowed on main)
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            python scripts/policy_guardrails.py --strict --no-waivers
          else
            python scripts/policy_guardrails.py --strict --no-waivers --git-diff-base "${{ github.event.before }}" --git-diff-head "${{ github.sha }}"
          fi
