name: Lint Workflows

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: reviewdog/action-actionlint@v1

      - name: Run actionlint
        uses: reviewdog/actionlint@v1
        with:
          reporter: github-pr-check
          fail_on_error: true