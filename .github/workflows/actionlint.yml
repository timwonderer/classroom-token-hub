name: Lint Workflows

permissions:
  contents: read
  checks: write

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"

jobs:
  actionlint:
    runs-on: ubuntu-latest

    steps:
      - name: actionlint with reviewdog
        uses: reviewdog/action-actionlint@v1.70.0
        with:
          reporter: github-pr-check
          fail_on_error: true