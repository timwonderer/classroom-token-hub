name: Check Database Migrations

on:
  push:
    branches: [ main ]
    paths:
      - 'migrations/versions/**'
      - 'app/models/**'
      - 'scripts/validate-migrations.py'
  pull_request:
    branches: [ main ]
    paths:
      - 'migrations/versions/**'
      - 'app/models/**'
      - 'scripts/validate-migrations.py'

  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # For commenting on PRs

jobs:
  validate-migrations:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history needed for migration checks

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install alembic flask-migrate
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Migration Validation Script
      run: |
        echo "🔍 Running comprehensive migration validation..."
        python scripts/validate-migrations.py

    - name: Comment on PR (if check fails)
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '⚠️ **Migration Validation Failed**\n\nThe migration validation script (`scripts/validate-migrations.py`) has failed. This script checks for:\n\n1. Continuous revision chain (no breaks/gaps)\n2. Single migration head\n3. Correct `upgrade()` and `downgrade()` functions\n4. **Idempotency checks** (e.g. guards for `add_column`)\n\nPlease check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
          })
