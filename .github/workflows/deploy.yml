name: Deploy to DO on push to main

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.DO_DEPLOY_KEY }}

    # SECURITY FIX: Add SSH host key verification to prevent MITM attacks
    - name: Set up SSH host key verification
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts
        echo "✓ SSH host key verification enabled"

    - name: Deploy to DO Production Server
      run: |
        # Intentionally avoid defaults: empty means "no override", so current server state is preserved.
        MAINT_MODE="${{ vars.MAINTENANCE_MODE }}"
        MAINT_MESSAGE="${{ vars.MAINTENANCE_MESSAGE }}"
        MAINT_END="${{ vars.MAINTENANCE_EXPECTED_END }}"
        MAINT_CONTACT="${{ vars.MAINTENANCE_CONTACT }}"
        TURNSTILE_SITE="${{ secrets.TURNSTILE_SITE_KEY || '' }}"
        TURNSTILE_SECRET="${{ secrets.TURNSTILE_SECRET_KEY || '' }}"
        PASSWORDLESS_API_KEY="${{ secrets.PASSWORDLESS_API_KEY || '' }}"
        PASSWORDLESS_API_PUBLIC="${{ secrets.PASSWORDLESS_API_PUBLIC || '' }}"
        DIGITALOCEAN_ACCESS_TOKEN="${{ secrets.DIGITALOCEAN_ACCESS_TOKEN || '' }}"

        SSH_ENV_VARS="MAINT_MODE=$(printf %q "$MAINT_MODE") MAINT_MESSAGE=$(printf %q "$MAINT_MESSAGE") MAINT_END=$(printf %q "$MAINT_END") MAINT_CONTACT=$(printf %q "$MAINT_CONTACT") TURNSTILE_SITE=$(printf %q "$TURNSTILE_SITE") TURNSTILE_SECRET=$(printf %q "$TURNSTILE_SECRET") PASSWORDLESS_API_KEY=$(printf %q "$PASSWORDLESS_API_KEY") PASSWORDLESS_API_PUBLIC=$(printf %q "$PASSWORDLESS_API_PUBLIC") DIGITALOCEAN_ACCESS_TOKEN=$(printf %q "$DIGITALOCEAN_ACCESS_TOKEN")"

        # Connect to the production server and deploy
        # SECURITY: Removed -o StrictHostKeyChecking=no (now uses known_hosts)
        ssh root@${{ secrets.PRODUCTION_SERVER_IP }} "export ${SSH_ENV_VARS}; bash -s" << 'EOF'

          set -e  # Exit immediately if a command exits with a non-zero status

          echo 'Navigating to project directory...'
          cd ~/classroom-economy

          echo 'Fetching latest changes from main...'
          git fetch origin main

          echo 'Resetting to match remote main branch...'
          git reset --hard origin/main

          echo 'Activating virtual environment...'
          source venv/bin/activate

          echo 'Updating environment variables...'
          # SECURITY: Set restrictive file permissions before writing secrets
          touch .env
          chmod 600 .env

          # Preserve current maintenance settings unless explicit override values are supplied from workflow vars.
          CURRENT_MAINT_MODE="$(grep -E '^MAINTENANCE_MODE=' .env | tail -1 | cut -d= -f2- || true)"
          CURRENT_MAINT_MESSAGE="$(grep -E '^MAINTENANCE_MESSAGE=' .env | tail -1 | cut -d= -f2- || true)"
          CURRENT_MAINT_END="$(grep -E '^MAINTENANCE_EXPECTED_END=' .env | tail -1 | cut -d= -f2- || true)"
          CURRENT_MAINT_CONTACT="$(grep -E '^MAINTENANCE_CONTACT=' .env | tail -1 | cut -d= -f2- || true)"

          # Normalize values that might already be wrapped in double quotes from prior writes.
          strip_wrapping_quotes() {
            local value="$1"
            if [[ "$value" == \"*\" && "$value" == *\" ]]; then
              value="${value#\"}"
              value="${value%\"}"
            fi
            printf '%s' "$value"
          }

          CURRENT_MAINT_MESSAGE="$(strip_wrapping_quotes "$CURRENT_MAINT_MESSAGE")"
          CURRENT_MAINT_END="$(strip_wrapping_quotes "$CURRENT_MAINT_END")"
          CURRENT_MAINT_CONTACT="$(strip_wrapping_quotes "$CURRENT_MAINT_CONTACT")"

          EFFECTIVE_MAINT_MODE="$CURRENT_MAINT_MODE"
          EFFECTIVE_MAINT_MESSAGE="$CURRENT_MAINT_MESSAGE"
          EFFECTIVE_MAINT_END="$CURRENT_MAINT_END"
          EFFECTIVE_MAINT_CONTACT="$CURRENT_MAINT_CONTACT"

          if [ -n "${MAINT_MODE}" ]; then
            EFFECTIVE_MAINT_MODE="${MAINT_MODE}"
          fi
          if [ -n "${MAINT_MESSAGE}" ]; then
            EFFECTIVE_MAINT_MESSAGE="${MAINT_MESSAGE}"
          fi
          if [ -n "${MAINT_END}" ]; then
            EFFECTIVE_MAINT_END="${MAINT_END}"
          fi
          if [ -n "${MAINT_CONTACT}" ]; then
            EFFECTIVE_MAINT_CONTACT="${MAINT_CONTACT}"
          fi

          # Default to disabled only when maintenance mode has never been set.
          if [ -z "${EFFECTIVE_MAINT_MODE}" ]; then
            EFFECTIVE_MAINT_MODE="false"
          fi

          # Remove old variables if they exist
          sed -i '/^MAINTENANCE_MODE=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_MESSAGE=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_EXPECTED_END=/d' .env 2>/dev/null || true
          sed -i '/^MAINTENANCE_CONTACT=/d' .env 2>/dev/null || true
          sed -i '/^TURNSTILE_SITE_KEY=/d' .env 2>/dev/null || true
          sed -i '/^TURNSTILE_SECRET_KEY=/d' .env 2>/dev/null || true
          sed -i '/^PASSWORDLESS_API_KEY=/d' .env 2>/dev/null || true
          sed -i '/^PASSWORDLESS_API_PUBLIC=/d' .env 2>/dev/null || true
          sed -i '/^DIGITALOCEAN_ACCESS_TOKEN=/d' .env 2>/dev/null || true

          # Add maintenance variables using effective values (preserved unless explicitly overridden)
          SAFE_MAINT_MESSAGE="${EFFECTIVE_MAINT_MESSAGE//\"/\\\"}"
          SAFE_MAINT_END="${EFFECTIVE_MAINT_END//\"/\\\"}"
          SAFE_MAINT_CONTACT="${EFFECTIVE_MAINT_CONTACT//\"/\\\"}"
          echo "MAINTENANCE_MODE=${EFFECTIVE_MAINT_MODE}" >> .env
          echo "MAINTENANCE_MESSAGE=\"${SAFE_MAINT_MESSAGE}\"" >> .env
          echo "MAINTENANCE_EXPECTED_END=\"${SAFE_MAINT_END}\"" >> .env
          echo "MAINTENANCE_CONTACT=\"${SAFE_MAINT_CONTACT}\"" >> .env

          # Add Turnstile keys if provided
          if [ -n "${TURNSTILE_SITE}" ]; then
            echo "TURNSTILE_SITE_KEY=${TURNSTILE_SITE}" >> .env
            echo "✓ Turnstile site key configured"
          fi
          if [ -n "${TURNSTILE_SECRET}" ]; then
            echo "TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET}" >> .env
            echo "✓ Turnstile secret key configured"
          fi

          # Add Passwordless.dev keys if provided
          if [ -n "${PASSWORDLESS_API_KEY}" ]; then
            echo "PASSWORDLESS_API_KEY=${PASSWORDLESS_API_KEY}" >> .env
            echo "✓ Passwordless.dev API key configured (length: ${#PASSWORDLESS_API_KEY})"
          fi
          if [ -n "${PASSWORDLESS_API_PUBLIC}" ]; then
            echo "PASSWORDLESS_API_PUBLIC=${PASSWORDLESS_API_PUBLIC}" >> .env
            echo "✓ Passwordless.dev public key configured (length: ${#PASSWORDLESS_API_PUBLIC})"
          fi

          # Add DigitalOcean token if provided (for pydo scripts)
          if [ -n "${DIGITALOCEAN_ACCESS_TOKEN}" ]; then
            echo "DIGITALOCEAN_ACCESS_TOKEN=${DIGITALOCEAN_ACCESS_TOKEN}" >> .env
            echo "✓ DigitalOcean access token configured (length: ${#DIGITALOCEAN_ACCESS_TOKEN})"
          fi

          # Verify .env file contains the keys
          echo "Verifying .env file contents..."
          if grep -q "^PASSWORDLESS_API_KEY=" .env; then
            echo "✓ PASSWORDLESS_API_KEY found in .env"
          else
            echo "⚠ PASSWORDLESS_API_KEY not found in .env"
          fi
          if grep -q "^PASSWORDLESS_API_PUBLIC=" .env; then
            echo "✓ PASSWORDLESS_API_PUBLIC found in .env"
          else
            echo "⚠ PASSWORDLESS_API_PUBLIC not found in .env"
          fi

          # SECURITY: Verify file permissions
          ls -la .env | grep -q '^-rw-------' && echo "✓ Secure .env permissions (600)" || echo "⚠ Warning: .env permissions not set correctly"

          echo 'Installing dependencies...'
          pip install -r requirements.txt

          # Ensure DATABASE_URL is set for migrations
          echo 'Exporting DATABASE_URL for production migrations...'

          echo '🔍 Running migration safety checks...'
          bash scripts/check-migrations.sh || {
            echo "❌ Migration safety check failed - deployment aborted"
            echo "This usually means there are multiple migration heads."
            echo "Fix this by creating a merge migration locally and pushing to main."
            exit 1
          }

          echo 'Running database migrations...'
          flask db upgrade


          echo 'Ensuring Gunicorn service has EnvironmentFile configured...'
          # Check if EnvironmentFile is already in the service
          if ! sudo grep -q "EnvironmentFile=/root/classroom-economy/.env" /etc/systemd/system/gunicorn.service 2>/dev/null; then
            echo "⚠ Warning: Adding EnvironmentFile to gunicorn.service"
            # Backup the service file
            sudo cp /etc/systemd/system/gunicorn.service /etc/systemd/system/gunicorn.service.bak
            # Add EnvironmentFile after [Service] section
            sudo sed -i '/^\[Service\]/a EnvironmentFile=/root/classroom-economy/.env' /etc/systemd/system/gunicorn.service
            sudo systemctl daemon-reload
            echo "✓ EnvironmentFile added to gunicorn.service"
          else
            echo "✓ EnvironmentFile already configured"
          fi

          echo 'Restarting Gunicorn...'
          sudo systemctl restart gunicorn

          echo 'Verifying environment variables are loaded...'
          # Check if gunicorn process has the environment variables
          if sudo systemctl show gunicorn | grep -q "EnvironmentFile"; then
            echo "✓ Gunicorn service has EnvironmentFile configured"
          else
            echo "⚠ Warning: EnvironmentFile not found in service configuration"
          fi

          # Verify the service file syntax
          sudo systemctl cat gunicorn | grep -A 2 "EnvironmentFile" || echo "⚠ EnvironmentFile directive not found"

          echo 'Deployment completed successfully.'

        EOF
