name: Accessibility Gate

on:
  pull_request:
    paths:
      - 'templates/**'
      - 'static/css/**'
      - 'app/routes/**'
      - 'app/forms.py'
      - 'tests/test_accessibility.py'
      - 'tests/test_axe_compliance.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  accessibility-audit:
    name: WCAG 2.1 AA Compliance Audit
    runs-on: ubuntu-latest
    environment: testing
    
    # Use a service container for the test database
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: classroom_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright
          playwright install chromium --with-deps

      - name: Initialize Database
        env:
          FLASK_APP: app
          FLASK_ENV: testing
          DATABASE_URL: postgresql://user:password@localhost:5432/classroom_test_db
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PEPPER_KEY: ${{ secrets.PEPPER_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          flask db upgrade

      - name: Run Accessibility Test Suites
        env:
          FLASK_APP: app
          FLASK_ENV: testing
          DATABASE_URL: postgresql://user:password@localhost:5432/classroom_test_db
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PEPPER_KEY: ${{ secrets.PEPPER_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          echo "♿ Running Structural & Axe-Core Accessibility Audits..."
          pytest tests/test_accessibility.py tests/test_axe_compliance.py -v
