<!-- Pulsetic monitoring key (monitor: hall-pass-verification). Do not remove. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Pass History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="{{ static_url('css/tokens.css') }}" rel="stylesheet">
    <link href="{{ static_url('css/style.css') }}" rel="stylesheet">
    <script src="{{ static_url('js/timezone-utils.js') }}"></script>
</head>
<body class="hall-pass-page">
    <div class="container">
        <div class="text-center hall-pass-header mb-4">
            <div class="hall-pass-subtitle text-uppercase small fw-semibold">Classroom Token Hub</div>
            <h1 class="d-flex justify-content-center align-items-center gap-2 mb-1">
                <span class="material-symbols-outlined">badge</span>
                Hall Pass History
            </h1>
            <p class="hall-pass-subtitle mb-3">This page shows the last 10 students who have used a hall pass.</p>
            <button class="btn btn-primary refresh-chip" onclick="fetchActivePasses()">
                <span class="material-symbols-outlined">refresh</span>
                Refresh
            </button>
        </div>

        <div id="noPassesMessage" class="alert alert-light text-center text-muted" style="display: none;">
            No recent hall pass activity
        </div>

        <div class="table-responsive">
            <table class="table table-hover" id="passesList">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Period</th>
                        <th>Status</th>
                        <th>Destination</th>
                        <th>Left At</th>
                        <th>Time Elapsed</th>
                        <th>Returned At</th>
                    </tr>
                </thead>
                <tbody id="passesTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function getActorPublicId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('actor');
        }

        function getClassId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('class_id');
        }

        function getTimeElapsed(isoString) {
            const leftTime = new Date(isoString);
            const now = new Date();
            const diffMs = now - leftTime;
            const diffMins = Math.floor(diffMs / 60000);

            if (diffMins < 1) return 'Just left';
            if (diffMins === 1) return '1 minute ago';
            return `${diffMins} minutes ago`;
        }

        function getDuration(leftTime, returnTime) {
            const left = new Date(leftTime);
            const returned = new Date(returnTime);
            const diffMs = returned - left;
            const diffMins = Math.floor(diffMs / 60000);

            if (diffMins < 1) return '< 1 min';
            if (diffMins === 1) return '1 min';
            return `${diffMins} mins`;
        }

        function renderPasses(passes) {
            const tableBody = document.getElementById('passesTableBody');
            const noPassesMessage = document.getElementById('noPassesMessage');
            const table = document.getElementById('passesList');

            if (!passes || passes.length === 0) {
                tableBody.innerHTML = '';
                table.style.display = 'none';
                noPassesMessage.style.display = 'block';
                return;
            }

            noPassesMessage.style.display = 'none';
            table.style.display = 'table';

            // HTML escape function to prevent XSS
            const escapeHtml = (text) => {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            };

            const html = passes.map(pass => {
                const isOut = pass.status === 'left';
                const statusText = isOut ? 'Out Now' : 'Returned';
                const statusClass = isOut ? 'badge bg-warning text-dark' : 'badge bg-success';
                const timeElapsed = isOut
                    ? getTimeElapsed(pass.left_time)
                    : (pass.return_time ? getDuration(pass.left_time, pass.return_time) : '—');
                const returnTime = pass.return_time ? window.TimezoneUtils.formatTimestamp(pass.return_time) : '—';

                // Escape all user-provided data to prevent XSS
                const studentName = escapeHtml(pass.student_name || '');
                const period = escapeHtml(pass.period || '');
                const destination = escapeHtml(pass.destination || '');

                return `
                <tr class="${isOut ? 'table-warning' : ''}">
                    <td class="fw-semibold">${studentName}</td>
                    <td>${period}</td>
                    <td><span class="${statusClass}">${statusText}</span></td>
                    <td>${destination || '—'}</td>
                    <td>${window.TimezoneUtils.formatTimestamp(pass.left_time)}</td>
                    <td>${timeElapsed}</td>
                    <td>${returnTime}</td>
                </tr>
            `;
            }).join('');

            tableBody.innerHTML = html;
        }

        function fetchActivePasses() {
            const actorPublicId = getActorPublicId();
            const classId = getClassId();
            if (!actorPublicId || !classId) {
                console.error('Missing actor or class_id parameter for verification display');
                return;
            }
            const url = `/api/hall-pass/verification/active?actor=${encodeURIComponent(actorPublicId)}&class_id=${encodeURIComponent(classId)}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        renderPasses(data.passes);
                    }
                })
                .catch(error => {
                    console.error('Error fetching active passes:', error);
                });
        }

        fetchActivePasses();
    </script>
</body>
</html>
