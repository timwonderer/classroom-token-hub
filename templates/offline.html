<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Classroom Token Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/tokens.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body class="offline-page">
    <div class="offline-card">
        <div class="offline-icon">
            <span class="material-symbols-outlined">wifi_off</span>
            <!-- Use a cellular-specific offline icon alongside wifi_off to indicate loss of network connectivity -->
            <span class="material-symbols-outlined">signal_cellular_connected_no_internet_0_bar</span>
        </div>
        <h1>You are offline</h1>
        <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
        <a href="/" class="btn btn-primary">Try Again</a>
    </div>
</body>

</html>
