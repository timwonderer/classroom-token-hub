<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Pass Queue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="{{ static_url('css/tokens.css') }}" rel="stylesheet">
    <link href="{{ static_url('css/style.css') }}" rel="stylesheet">
</head>
<body class="hall-pass-queue-page">
    <div class="queue-container">
        <h1 class="queue-title"><span class="material-symbols-outlined icon-hero">list_alt</span> Hall Pass Queue</h1>
        <p class="queue-subtitle">Current Restroom Queue Status</p>

        <div class="queue-stats">
            <div class="stat-card">
                <div class="stat-number" id="queueCount">0</div>
                <div class="stat-label">In Queue</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="outNowCount">0</div>
                <div class="stat-label">Currently Out</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="availableSlots">10</div>
                <div class="stat-label">Available Slots</div>
            </div>
        </div>

        <div id="limitWarning" class="limit-warning" style="display: none;">
            <span class="material-symbols-outlined">warning</span> <span id="limitWarningText">Queue limit reached! Restroom, Locker, and Office passes are temporarily unavailable.</span>
        </div>

        <div class="queue-list-container">
            <div class="queue-list-header">Queue (Approved, Not Yet Checked Out)</div>
            <div id="queueList"></div>
            <div id="emptyQueue" class="empty-queue" style="display: none;">
                <div class="empty-queue-icon"><span class="material-symbols-outlined icon-hero text-success">check_circle</span></div>
                <div class="empty-queue-text">No one in queue</div>
            </div>
        </div>
    </div>

    <script>
        // Get teacher_id from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const teacherId = urlParams.get('teacher_id');
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString(undefined, {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }

        function getTimeElapsed(isoString) {
            const approvedTime = new Date(isoString);
            const now = new Date();
            const diffMs = now - approvedTime;
            const diffMins = Math.floor(diffMs / 60000);

            if (diffMins < 1) return 'Just now';
            if (diffMins === 1) return '1 min ago';
            return `${diffMins} mins ago`;
        }

        function renderQueue(data) {
            const queueList = document.getElementById('queueList');
            const emptyQueue = document.getElementById('emptyQueue');
            const queueCount = document.getElementById('queueCount');
            const outNowCount = document.getElementById('outNowCount');
            const availableSlots = document.getElementById('availableSlots');
            const limitWarning = document.getElementById('limitWarning');
            const limitWarningText = document.getElementById('limitWarningText');

            const queueSize = data.queue.length;
            const outCount = data.currently_out;
            const totalOccupied = queueSize + outCount;
            const queueLimit = data.queue_limit || 10;
            const available = Math.max(0, queueLimit - totalOccupied);
            const queueEnabled = data.queue_enabled !== false;

            // Update stats
            queueCount.textContent = queueSize;
            queueCount.className = 'stat-number' + (queueSize >= 7 ? ' warning' : '');

            outNowCount.textContent = outCount;
            outNowCount.className = 'stat-number' + (outCount >= 7 ? ' warning' : '');

            availableSlots.textContent = available;
            availableSlots.className = 'stat-number' + (available === 0 ? ' danger' : available <= 3 ? ' warning' : '');

            // Show/hide warning
            if (!queueEnabled) {
                limitWarning.style.display = 'block';
                limitWarningText.textContent = 'Queue System Disabled! Only Summon and Nurse passes are available.';
            } else if (totalOccupied >= queueLimit) {
                limitWarning.style.display = 'block';
                limitWarningText.textContent = 'Queue limit reached! Restroom, Locker, and Office passes are temporarily unavailable.';
            } else {
                limitWarning.style.display = 'none';
            }

            // Render queue
            if (data.queue.length === 0) {
                queueList.innerHTML = '';
                emptyQueue.style.display = 'block';
                return;
            }

            emptyQueue.style.display = 'none';

            const html = data.queue.map((item, index) => {
                return `
                <div class="queue-item">
                    <div class="queue-position">#${index + 1}</div>
                    <div>
                        <div class="queue-student-name">${item.student_name}</div>
                        <div class="queue-destination">${item.destination}</div>
                    </div>
                    <div class="queue-time">${getTimeElapsed(item.approved_time)}</div>
                </div>
            `;
            }).join('');

            queueList.innerHTML = html;
        }

        function fetchQueue() {
            // Build URL with teacher_id if available
            let url = '/api/hall-pass/queue';
            if (teacherId) {
                url += `?teacher_id=${teacherId}`;
            }
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        renderQueue(data);
                    } else {
                        console.error('Error response from queue API:', data?.message || 'Unknown error');
                    }
                })
                .catch(error => {
                    console.error('Error fetching queue:', error);
                });
        }

        // Initial fetch
        fetchQueue();

        // Refresh every 30 seconds
        setInterval(fetchQueue, 30000);
    </script>
</body>
</html>
