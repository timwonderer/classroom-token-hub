# Classroom Token Hub v1 sunset cutover
#
# Purpose:
# - Stop proxying v1 Flask traffic at the edge.
# - Redirect every subdomain request to the canonical transition page.
# - Serve only /v2transition.html and /learnmore.html plus the original CSS
#   assets those pages already reference from the apex domain.
#
# Update `root` to the deployed docs directory before enabling.

server {
    listen 80;
    listen [::]:80;
    server_name ~^.+\.classroomtokenhub\.com$;
    return 302 https://classroomtokenhub.com/v2transition.html;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^.+\.classroomtokenhub\.com$;

    ssl_certificate /etc/letsencrypt/live/classroomtokenhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/classroomtokenhub.com/privkey.pem;

    return 302 https://classroomtokenhub.com/v2transition.html;
}

server {
    listen 80;
    listen [::]:80;
    server_name classroomtokenhub.com www.classroomtokenhub.com;
    return 301 https://classroomtokenhub.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name classroomtokenhub.com www.classroomtokenhub.com;

    ssl_certificate /etc/letsencrypt/live/classroomtokenhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/classroomtokenhub.com/privkey.pem;

    root /var/www/classroom-economy/docs;
    index v2transition.html;

    location = /v2transition.html {
        try_files /v2transition.html =404;
    }

    location = /learnmore.html {
        try_files /learnmore.html =404;
    }

    location = /style.css {
        try_files /style.css =404;
    }

    location = /static/css/tokens.css {
        alias /var/www/classroom-economy/static/css/tokens.css;
    }

    location = / {
        return 302 /v2transition.html;
    }

    location / {
        return 302 /v2transition.html;
    }
}
